<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Masterclass · Boutique Construtora</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:            #1f2426;
    --bg-surface:    #242b2e;
    --fg:            #e9e4d8;
    --fg-muted:      #7d776e;
    --primary:       #115551;
    --primary-dark:  #0d413e;
    --primary-fg:    #f7f5f1;
    --border:        #2e3539;
    --gold:          #bf9d18;
    --gold-2:        #e4be25;
    --sans: 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
    --serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── Nav ── */
  nav {
    background: var(--primary);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-shrink: 0;
    position: relative;
    border-bottom: 1px solid rgba(191,157,24,.25);
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  nav img {
    height: 46px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: .92;
  }
  .nav-meta {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding-left: 18px;
    border-left: 1px solid rgba(191,157,24,.3);
  }
  .nav-meta-k {
    font-size: 9px;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: rgba(247,245,241,.5);
  }
  .nav-meta-v {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    color: var(--gold-2);
    line-height: 1;
  }
  .nav-cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--primary);
    background: var(--gold-2);
    padding: 14px 24px;
    text-decoration: none;
    white-space: nowrap;
    transition: background .25s ease, transform .25s ease;
  }
  .nav-cta:hover {
    background: var(--gold-3, #ebd060);
    transform: translateY(-1px);
  }
  .nav-cta .arrow { transition: transform .25s ease; }
  .nav-cta:hover .arrow { transform: translateX(4px); }

  @media (max-width: 720px) {
    nav { padding: 14px 18px; }
    .nav-meta { display: none; }
    .nav-cta .cta-full { display: none; }
    .nav-cta::after { content: 'Inscrever-se'; }
  }

  /* ── Player section ── */
  .player-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 20px 48px;
    gap: 24px;
  }

  /* title block */
  .title-block {
    text-align: center;
    max-width: 640px;
  }
  .eyebrow {
    font-size: 10px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 12px;
  }
  .title-block h1 {
    font-family: var(--serif);
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 500;
    line-height: 1.2;
    color: var(--fg);
  }
  .title-block h1 em {
    font-style: italic;
    color: var(--gold-2);
  }
  .deco-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    width: 80px;
    margin: 14px auto 0;
  }

  /* video container */
  .video-container {
    width: 100%;
    max-width: 900px;
    position: relative;
    border: 1px solid var(--border);
    background: #000;
    box-shadow: 0 24px 64px rgba(0,0,0,.55);
  }
  /* gold inner border accent */
  .video-container::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(191,157,24,.15);
    pointer-events: none;
    z-index: 1;
  }
  .video-container iframe {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    border: none;
  }

  /* info strip */
  .info-strip {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border: 1px solid var(--border);
    background: var(--bg-surface);
  }
  .info-item {
    padding: 16px 20px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .info-item:last-child { border-right: none; }
  .info-k {
    font-size: 9px;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 6px;
  }
  .info-v {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    color: var(--fg);
    line-height: 1.2;
  }
  .info-v em { font-style: italic; color: var(--gold-2); }

  /* ── CTA ── */
  .cta {
    width: 100%;
    max-width: 900px;
    border: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 24px 32px;
    text-decoration: none;
    color: var(--fg);
    transition: border-color .25s ease, background .25s ease;
  }
  .cta:hover {
    border-color: rgba(191,157,24,.5);
    background: #28302f;
  }
  .cta-text .cta-k {
    font-size: 9px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 8px;
  }
  .cta-text .cta-h {
    font-family: var(--serif);
    font-size: clamp(18px, 3vw, 24px);
    font-weight: 500;
    line-height: 1.25;
    color: var(--fg);
  }
  .cta-text .cta-h em { font-style: italic; color: var(--gold-2); }
  .cta-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--primary-fg);
    background: var(--primary);
    border: 1px solid rgba(191,157,24,.4);
    padding: 14px 22px;
    white-space: nowrap;
    transition: background .25s ease;
  }
  .cta:hover .cta-btn { background: var(--primary-dark); }
  .cta-btn span.arrow { transition: transform .25s ease; }
  .cta:hover .cta-btn span.arrow { transform: translateX(4px); }

  @media (max-width: 520px) {
    .cta { flex-direction: column; align-items: flex-start; text-align: left; }
    .cta-btn { width: 100%; justify-content: center; }
  }

  /* ── Footer ── */
  footer {
    background: var(--primary);
    padding: 20px 24px;
    text-align: center;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: rgba(247,245,241,.35);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <img src="https://masterclass-boutique--f4259h9zbn.replit.app/assets/logo-boutique-B1SX_fLI.webp" alt="Boutique Construtora" />
    <div class="nav-meta">
      <span class="nav-meta-k">Masterclass</span>
      <span class="nav-meta-v">22 jun · 19h</span>
    </div>
  </div>
  <a class="nav-cta" href="index.html#inscricao">
    <span class="cta-full">Gostaria de me inscrever na masterclass</span>
    <span class="arrow">&rarr;</span>
  </a>
</nav>

<div class="player-wrap">

  <div class="video-container">
    <iframe
      src="https://drive.google.com/file/d/13DvYo3cKsoHkr4_KJQjzzOIOKoP7G4Rb/preview"
      allow="autoplay"
      allowfullscreen
    ></iframe>
  </div>

  <a class="cta" href="https://boutiqueconstrutora.com.br/bio/" target="_blank" rel="noopener">
    <div class="cta-text">
      <div class="cta-k">Continue explorando</div>
      <div class="cta-h">Conheça os <em>outros produtos</em> da Boutique Construtora</div>
    </div>
    <span class="cta-btn">Acessar <span class="arrow">&rarr;</span></span>
  </a>

</div>

<footer>
  Boutique Construtora — Todos os direitos reservados.
</footer>

<script>
  // Trap back-button: pushing a duplicate state means popstate just re-pushes,
  // so the user never navigates away from this page.
  history.pushState(null, '', window.location.href);
  window.addEventListener('popstate', function () {
    history.pushState(null, '', window.location.href);
  });
</script>

</body>
</html>
